name: examples

on:
  push:
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgecode-dev texlive-latex-base texlive-latex-recommended texlive-latex-extra texlive-fonts-recommended dvipsk-java ghostscript
      - name: Checkout Gecode sources
        run: git clone --depth=1 https://github.com/Gecode/gecode.git ../gecode
      - name: Python unit tests
        run: uv run -- python -m unittest discover -s tests -p "test_*.py"
      - name: Guard root chapter files
        run: test -z "$(find . -maxdepth 1 -type f -name '*.tex.in' -print -quit)"
      - name: make test
        run: make test GECODE_ROOT=../gecode GECODE_PREFIX=/usr
      - name: make docs
        run: make docs
