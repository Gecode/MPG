name: examples

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5
      - name: Doctor
        run: uv run -- python bin/mpg.py doctor
      - name: Extract
        run: uv run -- python bin/mpg.py extract
      - name: Test all examples
        run: uv run -- python bin/mpg.py test --kind all
